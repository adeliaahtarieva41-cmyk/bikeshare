{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="gpt-container">
    <h1 class="section-title">🤖 Yandex GPT</h1>
    <p class="gpt-subtitle">Задайте любой вопрос нейросети</p>
    
    <div class="chat-card">
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="message-bubble">
                    👋 Привет! Я Yandex GPT. Задай мне любой вопрос о велосипедах, аренде или что угодно!
                </div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" id="questionInput" class="chat-input" 
                   placeholder="Введите ваш вопрос..." autocomplete="off">
            <button id="sendBtn" class="chat-send-btn">Отправить</button>
        </div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = isUser ? 'message user-message' : 'message bot-message';
        messageDiv.innerHTML = `<div class="message-bubble">${text}</div>`;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showLoading() {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message bot-message loading';
        loadingDiv.id = 'loadingIndicator';
        loadingDiv.innerHTML = '<div class="message-bubble">🤔 Думаю...</div>';
        chatMessages.appendChild(loadingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideLoading() {
        const loading = document.getElementById('loadingIndicator');
        if (loading) loading.remove();
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question) return;

        addMessage(question, true);
        questionInput.value = '';
        showLoading();

        try {
            // ПРОСТАЯ ОТПРАВКА БЕЗ CSRF (для теста)
            const response = await fetch('/gpt/ask/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `question=${encodeURIComponent(question)}`
            });

            console.log('Статус:', response.status);
            const data = await response.json();
            console.log('Ответ:', data);
            hideLoading();

            if (data.answer) {
                addMessage(data.answer);
            } else {
                addMessage('❌ Ошибка: ' + JSON.stringify(data));
            }
        } catch (error) {
            console.error('Ошибка:', error);
            hideLoading();
            addMessage('❌ Ошибка соединения: ' + error.message);
        }
    }

    sendBtn.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendQuestion();
    });
</script>

<style>
    .gpt-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
    }
    
    .gpt-subtitle {
        text-align: center;
        color: #7f8c8d;
        margin-bottom: 30px;
    }
    
    .chat-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 5px 25px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    
    .chat-messages {
        height: 450px;
        overflow-y: auto;
        padding: 20px;
        background: #f8f9fa;
    }
    
    .message {
        margin-bottom: 15px;
        display: flex;
    }
    
    .user-message {
        justify-content: flex-end;
    }
    
    .user-message .message-bubble {
        background: #c44569;
        color: white;
        border-radius: 20px 20px 5px 20px;
    }
    
    .bot-message .message-bubble {
        background: white;
        color: #333;
        border-radius: 20px 20px 20px 5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    
    .message-bubble {
        max-width: 70%;
        padding: 12px 18px;
        font-size: 14px;
        line-height: 1.5;
    }
    
    .chat-input-area {
        display: flex;
        padding: 15px;
        background: white;
        border-top: 1px solid #eee;
    }
    
    .chat-input {
        flex: 1;
        padding: 12px 18px;
        border: 1px solid #ddd;
        border-radius: 30px;
        font-size: 14px;
        outline: none;
    }
    
    .chat-input:focus {
        border-color: #c44569;
    }
    
    .chat-send-btn {
        background: #c44569;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 30px;
        margin-left: 10px;
        cursor: pointer;
        font-weight: 500;
        transition: background 0.2s;
    }
    
    .chat-send-btn:hover {
        background: #a03a56;
    }
    
    .loading .message-bubble {
        color: #95a5a6;
        font-style: italic;
    }
</style>
{% endblock %}
